name: Terraform Plan Test2

on:
  push:
    branches:
      - test-2

  workflow_dispatch:

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: codes-terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: codes-terraform
        
